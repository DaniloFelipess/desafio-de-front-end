apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: weather-app
  annotations:
    kubernetes.io/ingress.class: nginx
spec:
  rules:
    - host: weather-app.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: weather-app
                port:
                  name: http
